<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GuardFlow — Last Scan JSON</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #0b1220;
    --surface: #101a2c;
    --border: #223049;
    --text-primary: #e6edf7;
    --text-muted: #7c8ba8;
    --cyan: #34d8c4;
    --red: #ef4444;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--sans);
  }
  .page {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px;
  }
  h1 {
    font-family: var(--mono);
    font-size: 16px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--cyan);
    margin: 0 0 4px;
  }
  .meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    margin: 0 0 20px;
  }
  .meta span {
    color: var(--text-primary);
  }
  pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.5;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .empty {
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 13px;
  }
  .error {
    color: var(--red);
    font-family: var(--mono);
    font-size: 13px;
  }
</style>
</head>
<body>
  <div class="page">
    <h1>GuardFlow — Last Scan JSON</h1>
    <p class="meta" id="scanMeta">Loading last scan…</p>
    <pre id="scanJson"></pre>
  </div>

  <script src="../utils/logger.js"></script>
  <script src="../utils/storage.js"></script>
  <script src="debug.js"></script>
</body>
</html>
